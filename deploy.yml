name: CI/CD Clothes4Happiness

# Define que a automação vai rodar sempre que houver um "push" (envio de código) na branch "main"
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-simulate-deploy:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa o código do repositório
    - name: Checkout do código
      uses: actions/checkout@v3

    # Passo 2: Simula testes de integração (CI)
    - name: Rodar testes simulados
      run: |
        echo "Rodando testes de verificação do código..."
        echo "Testes concluídos com sucesso!"

    # Passo 3: Constrói a imagem Docker
    - name: Build da Imagem Docker
      run: docker build -t clothes-sistema:latest .

    # Passo 4: Salva a imagem Docker como um artefato (Simulando o envio para o servidor)
    - name: Salvar imagem Docker
      run: docker save clothes-sistema:latest > clothes-sistema.tar

    - name: Upload do Artefato
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: clothes-sistema.tar